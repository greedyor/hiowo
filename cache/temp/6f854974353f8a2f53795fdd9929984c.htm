            <h2>一年诞生12000个新闻播客，小而美市场肩负媒体大使命</h2>
            <div id="test-editormd-view">
                <textarea id="hide-textarea" hidden>15年前，“播客”的概念被提出；现在，播客已经成为当下传媒领域最热门的趋势之一。从《路透社数字新闻报告》来看，播客正在风靡全球：调查的38个国家中，36％左右的人表示每月至少收听一次播客，其中，15％左右的人收听过新闻播客。据市场调研机构Edison Research估计，全美播客的月活跃听众已达9000万人，与2015年相比翻了一倍。在英国，播客的使用率较去年增长了40％。这其中，越来越多的年轻人通过播客获取信息，进行娱乐和消遣。



今年10月，全媒派在《技术墙亟待突破，商业化潜力无穷，播客浪潮里没有中场休息》中盘点了播客领域的新趋势。本期全媒派编译路透新闻研究所的Nic Newman发布于尼曼新闻实验室的文章，聚焦新闻播客细分领域。这项研究基于五个国家（英国、美国、澳大利亚、法国和瑞典）的播客制作数据，和对30多家主要的播客媒体及主播的访谈，探讨新闻播客在内容创新、商业模式等方面的潜力。



[![aa](https://img.huxiucdn.com/article/content/201912/24/092031034604.jpg?imageView2/2/w/1000/format/jpg/interlace/1/q/85 "aa")](https://img.huxiucdn.com/article/content/201912/24/092031034604.jpg?imageView2/2/w/1000/format/jpg/interlace/1/q/85 "aa")



每日新闻播客正在崛起



在调查中，我们惊讶地发现：大部分表现出色的每日新闻播客，都是在最近18个月内创立的。《纽约时报》旗下的The Daily每天约有200万听众。在播客数据分析机构Podtrac的十月播客排名中，The Daily位列第一，第二名是NPR旗下的Up First。“每天有25分钟时间和新朋友互动，我们感到非常开心。”《纽约时报》的音频总监、奈特-尼曼访问学者Erik Borenstein说，“在我们心中，The Daily就是新的头版。”



《经济学人》的数据显示，The Intelligence成立不到一年，每月的听众已达150万，每个听众平均每周下载三至四集播客。听众数量不少，不过还无法和美国最受欢迎的广播新闻节目相提并论。



英国的播客听众规模虽不及美国，但数量依然可观。在不到一年的时间内，《卫报》旗下的播客“Today in Focus”的听众已经超过了报纸。“每天都有成千上万的人来听我们的播客。”《卫报》的音频负责人Christian Bennett告诉我们，播客深受年轻群体喜爱，完播率达到80%。



我们总共调查了分布在5个国家或地区的60个不同的本地新闻播客（不包括广播节目）。许多媒体人表示，自己是在The Daily的启发下开始制作播客的。



目前，新闻播客的内容可分为两种：一类播客每集只讲一个大故事，面向早晨通勤族，如法国《巴黎人报》旗下的Code Source 和《回声报》旗下的La Story，瑞典的Aftonbladet Daily，《卫报》的Today in Focus，以及澳大利亚Schwartz Media旗下的7am。另一些播客则把多条报道结合在一起，在傍晚播出，如《华盛顿邮报》的Post Reports和《伦敦旗帜晚报》的The Leader。







媒体积极入局新闻播客，他们希望能利用播客吸引年轻的观众，培养他们的收听习惯，进而增加额外收入。一流广告商对播客的青睐，改变了行业的经济模式。在《经济学人》每日新闻播客工作的Tom Standage告诉我们：“由于市场对投放播客广告的需求量很大，播客的赞助收益不菲。最大的变化发生在商业广告上。去年开始，一些广告商来跟我们说，‘我们明年只打算在报纸和播客两种渠道投放广告，你们可以提供哪种？’”但是，在法国、瑞典等欧洲市场，对播客发展的预测却没有这么乐观：这些国家的受众群体较小，相应地，播客广告市场也还未得到充分发展。



播客内容生产：从人才到题材



播客制作团队的规模有多大？



The Daily大约有15名全职制作播客的员工，《卫报》的Today in Focus有10名员工，《经济学人》的播客则有8名员工。在规模较小的播客中，一般只有四五名员工负责制作每天的内容，如Schwartz Media，Le Parisien和Les Echos。制作团队通常由一两名主持人、一名执行制作人、一两名制作人以及一名声音工程师/声音设计师组成。



新闻播客的内容，也并不仅限于深入探讨单个故事。我们的研究发现，每日新闻播客大致可分为三个子类别：



新闻简报，时长在1至5分钟之间，主要在语音设备和Spotify Drive等新平台投放（例如：BBC Minute）



新闻摘要，时长在6到15分钟之间（例如：NPR的Up First）



深度报道，时长在15至30分钟之间（例如：The Daily）









研究发现，来自平面媒体或数字原生媒体的机构，更注重深度报道，以发挥他们在分析、解释问题上的优势。与此相反，许多广播公司专注于制作新闻简报，将现有的广播新闻节目重新分发，制成播客。他们的原创播客主要针对那些不使用传统媒体的用户，包括年轻群体和多元化群体。



除每日新闻播客之外，媒体更青睐即兴访谈。许多成功的播客都由名人主导，例如Vox出品的The Ezra Klein Show和《泰晤士报》的Giles Coren Has No Idea。对媒体而言，利用新闻编辑室现有的人才，成本相对比较低。



而广播电台希望发挥自己在纪录片及音频制作方面的优势，来制作系列节目。在我们调查的国家中，所有主要的广播公司都投资了系列节目。其中包括由BBC和挪威的NRK制作的纪实犯罪播客DeathIn Ice Valley，以及澳大利亚广播公司的系列节目Russia If You’re Listening。这个系列涉及穆勒报告、俄罗斯对西方国家的干预等内容，具有里程碑意义。







小而美的细分领域，谁在搅动市场？



在播客生态系统中，新闻播客仅占其中一小部分（苹果平台的播客有77万种，新闻播客仅占6％），但由于新闻内容的吸引力和粘性更强，新闻播客比其他类型的播客听众更多。



分析公司Chartable的数据显示，新闻播客占美国苹果播客榜单最受欢迎节目的21％。其他国家或地区情况与此类似：法国的热门播客中，34%为新闻播客；瑞典和澳大利亚为18％，英国为16％。总体看来，虽然播客数量的增速有所放缓，但每年新诞生的播客依然能超过20万。







新入局的平台带来了新的想法和投资，搅动着播客市场的格局。



苹果的平台仍然是播客界的主流，而Spotify借助音乐服务推广内容，过去一年将市场份额翻了一番。许多付费播客供应商正致力于代理原创内容，并投入大量资金制作独家内容。这种模式为喜剧、体育、生活方式、故事讲述等领域的媒体带来了新的发展机遇：在美国，Luminary和Stitcher Premium等新平台正试图建立基于高级订阅的新商业模式；在欧洲，法国的Majelan和Sybel，丹麦的Podimo都推出了许多新服务。这些公司都有成为“播客界Netflix”的野心——他们致力于投资原创音频，并向公众普及播客。



不能忽视的是，科技公司和其他中间商影响力的增强，给播客带来了新闻业熟悉的挑战。很多媒体担心商业平台会利用他们的内容创作，经营有利可图的业务；另一些媒体则担心，如果平台将播客都纳入自己名下，他们会失去与观众的直接联系，甚至失去他们自身的数据。尤其是公共广播公司，正在尝试为音频内容搭建自有的音频服务平台（如BBC Sounds和NPR One），已开始将其内容发布到自己的平台上，并隐藏第三方提供的内容。



大多数媒体相信，播客还有很大的发展潜力。通过创新音频驱动界面，人们可以更方便地在家里、在旅途中收听播客。但播客的发展依然面临很多挑战：目前，播客的盈利水平依然不高，平台和独立制作人之间的竞争不断加剧；播客虽然吸引了众多年轻人，但他们主要来自受过良好教育的精英阶层。要吸引更多的主流群体，播客需要更多样化的内容和形式，更友好的使用界面，以及更多的发行渠道。这些变化可能需要一些时间。







数据显示，仅去年一年，就有1.2万个新的新闻播客诞生。如何从目前市场上已有的5万新闻播客中脱颖而出？在提倡专业化的时代中，高质量的内容注定长青，能吸引投资方押注，也能吸引消费者买单。它既意味着扎实的团队、专业的流程、创意的最大化，同时也意味着，要在此基础上各种变现形式的探索，如广告、付费等商业化模式成为可能。内容为王，在新闻播客这一细分领域同样适用。
